<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Permaculture Works Project Control Record v2.0</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f5f3ee;color:#1f2933}header{background:#22301f;color:white;padding:24px}main{max-width:1100px;margin:auto;padding:20px;display:grid;grid-template-columns:280px 1fr;gap:16px}nav,.card,.toolbar{background:white;border:1px solid #d9d3c7;border-radius:16px;box-shadow:0 10px 24px #0001}.toolbar{padding:12px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}.card{padding:20px}button,.file-label{padding:10px 12px;border-radius:10px;border:1px solid #aab4a5;background:white;font-weight:700;cursor:pointer}.primary{background:#486b3f;color:white}.warn{background:#fff7df}.danger{color:#9b2c2c}input[type=file]{display:none}nav{padding:12px;position:sticky;top:12px;align-self:start}.nav-button{display:block;width:100%;text-align:left;margin:3px 0}.active{background:#edf4ea}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-weight:700;margin-top:10px}input,textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid #c9c3b8}textarea{min-height:90px}.notice{background:#fff9e8;border:1px solid #ead59a;border-radius:14px;padding:12px;margin-bottom:16px}.file{font-family:monospace;background:#162013;color:#e9f5e3;border-radius:10px;padding:10px;margin-top:12px;overflow-wrap:anywhere}@media(max-width:850px){main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Permaculture Works Project Control Record v2.0</h1><p>Public-safe single-file form system. This repository copy uses placeholders only.</p></header>
<main><nav id="nav"></nav><section><div class="toolbar"><button class="primary" id="save">Save JSON</button><label class="file-label" for="load">Load JSON</label><input id="load" type="file" accept=".json,application/json"><button id="print">Print</button><button class="warn" id="draft">Save Draft</button><button class="danger" id="clear">Clear</button><span id="status">Ready.</span></div><div class="notice"><b>Public safety:</b> do not commit real client names, addresses, coordinates, emails, or phone numbers. Store private records in ignored local folders.</div><div id="form"></div></section></main>
<script>
const SAFE={project_name:'Example Homestead Project',project_id:'ANON-2026-001',client_name:'Client A',prepared_by:'Designer / Organization',project_address:'Example Site Address'};
const FORMS={
intake:['01 Project Intake & Goals','project_intake_client_goals',['client_contact_notes','goals','budget_timeline','maintenance_capacity','constraints','desired_outputs']],
site:['02 Site Observation','site_observation_record',['visit_conditions','water_story','soil_notes','sun_shade_notes','vegetation_wildlife','infrastructure_access','photo_log','next_actions']],
map:['03 Base Map Verification','base_map_verification',['map_source','boundary_status','scale_status','utilities_marked','limitations','required_corrections']],
risk:['04 Constraints & Risk Register','constraints_risk_register',['known_constraints','risk_summary','control_measures','go_no_go_concerns']],
decisions:['05 Design Decision Log','design_decision_log',['decision','reasoning','alternatives','evidence','approval_status']],
scope:['06 Phase 1 Scope Freeze','phase_1_scope_freeze',['phase_goal','included_work','excluded_work','assumptions','client_responsibilities','change_order_rule']],
materials:['07 Plant & Materials Specification','plant_materials_specification',['plant_list','materials_list','protection_materials','substitution_rules','procurement_status']],
work:['08 Installation Work Order','installation_work_order',['work_date','crew','tools','task_sequence','quality_checkpoints','safety_notes']],
daily:['09 Daily Installation Record','daily_installation_record',['weather','work_completed','materials_used','issues','client_notes','next_priorities']],
deviation:['10 Deviation Field Change Log','deviation_field_change_log',['change_description','reason','impact','corrective_action','approval_status']],
change:['11 Change Order Form','change_order_form',['requested_change','reason','cost_impact','schedule_impact','risk_impact','approval_notes']],
walk:['12 Final Walkthrough Punch List','final_walkthrough_punch_list',['completion_summary','punch_list','remaining_concerns','acceptance_status']],
care:['13 Client Maintenance Handoff','client_maintenance_handoff',['watering','weeding','mulch','protection_checks','warning_signs','follow_up_date']],
follow:['14 Follow Up Inspection','follow_up_inspection',['plant_status','moisture_condition','weed_pressure','animal_damage','corrective_actions','future_opportunities']],
close:['15 Project Closeout Report','project_closeout_report',['completed_scope','final_deliverables','open_items','feedback','lessons_learned','future_recommendations']]
};
let key=Object.keys(FORMS)[0];let store={};
function today(){return new Date().toISOString().slice(0,10)}function slug(x){return String(x||'project').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'project'}
function vals(){store[key]=store[key]||{};let f=FORMS[key];Object.assign(store[key],Object.fromEntries(Object.entries(SAFE).filter(([k])=>store[key][k]==null)));store[key].document_name??=f[1];store[key].document_version??='2.0.0';store[key].date_prepared??=today();return store[key]}
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}
function renderNav(){nav.innerHTML='<h3>Forms</h3>'+Object.entries(FORMS).map(([k,f])=>`<button class="nav-button ${k===key?'active':''}" onclick="capture();key='${k}';render()">${f[0]}</button>`).join('')}
function input(n,label,type='text'){let v=vals()[n]||'';return `<label>${label}<${type==='textarea'?'textarea':'input'} data-name="${n}" ${type==='textarea'?'':`type="${type}" value="${esc(v)}"`}>${type==='textarea'?esc(v):''}${type==='textarea'?'</textarea>':''}</label>`}
function capture(){document.querySelectorAll('[data-name]').forEach(e=>{store[key][e.dataset.name]=e.value})}
function record(){capture();let f=FORMS[key];return {app:'Permaculture Works Project Control Record',app_version:'2.0.0-public-safe',form_key:key,form_title:f[0],form_slug:f[1],saved_at:new Date().toISOString(),values:vals()}}
function filename(){let r=record(),v=r.values;return `${slug(v.project_name)}_${slug(v.document_name)}_v${slug(v.document_version)}_${v.date_prepared}.json`}
function render(){renderNav();let f=FORMS[key];let meta=['project_name','project_id','client_name','prepared_by','project_address','date_prepared','document_name','document_version'];form.innerHTML=`<article class="card"><h2>${f[0]}</h2><p>Use public-safe placeholders in committed examples. Replace locally only for private work.</p><div class="grid">${meta.map(m=>input(m,m.replaceAll('_',' '),m==='date_prepared'?'date':'text')).join('')}</div><h3>Form fields</h3>${f[2].map(n=>input(n,n.replaceAll('_',' '),'textarea')).join('')}<div class="file">${filename()}</div></article>`;document.querySelectorAll('[data-name]').forEach(e=>e.addEventListener('input',()=>{capture();render()}))}
function save(){let r=record();let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(r,null,2)],{type:'application/json'}));a.download=filename();a.click();URL.revokeObjectURL(a.href);status.textContent='JSON exported.'}
function saveDraft(){capture();localStorage.setItem('pcr_v2_public_safe',JSON.stringify({key,store}));status.textContent='Draft saved.'}
function loadDraft(){try{let raw=localStorage.getItem('pcr_v2_public_safe');if(raw){let d=JSON.parse(raw);key=d.key||key;store=d.store||{}}}catch(e){}}
function clearForm(){if(confirm('Clear current form?')){store[key]={};render()}}
function loadFile(file){let reader=new FileReader();reader.onload=()=>{try{let r=JSON.parse(reader.result);key=FORMS[r.form_key]?r.form_key:key;store[key]=r.values||{};render();status.textContent='JSON loaded.'}catch(e){status.textContent='Could not load JSON.'}};reader.readAsText(file)}
save.onclick=save;draft.onclick=saveDraft;clear.onclick=clearForm;print.onclick=()=>window.print();load.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};loadDraft();render();
</script>
</body>
</html>
